name: CI (Debug)
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Publish
        run: dotnet publish -p:PublishSingleFile=true -p:CommitHash=${{ github.sha }} -p:CommitRef=${{ github.ref_type }}/${{ github.ref_name }} -r win-x64 -c Debug --self-contained false .\RoBoost\RoBoost.csproj

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: RoBoost (Debug) (${{ github.sha }})
          path: .\RoBoost\bin\Debug\net6.0-windows\win-x64\publish\*
          retention-days: 3
